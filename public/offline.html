<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>オフライン — 三姉妹タスク</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #faf8f5;
      color: #333;
      font-family: sans-serif;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; color: #3a7ca5; }
    p  { font-size: 0.9rem; color: #666; margin: 0 0 1.5rem; }
    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      background: #3a7ca5;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>オフラインです</h1>
  <p>ネットワークに接続して<br>もう一度お試しください</p>
  <button onclick="location.reload()">再読み込み</button>
</body>
</html>
